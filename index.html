<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melany Studio | Catálogo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        cream: '#FDFBF7',
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilo elegante para la notificación flotante del carrito */
        #toast-notification {
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #toast-notification.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-cream text-gray-900 font-sans antialiased">

    <!-- Encabezado -->
    <header class="bg-black text-white py-6 px-4 shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest text-gold">MELANY STUDIO</h1>
            <button onclick="toggleCartModal()" class="relative bg-gold/20 text-gold px-4 py-2 rounded-full border border-gold/40 flex items-center space-x-2 hover:bg-gold/30 transition">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-counter" class="font-semibold">0</span>
            </button>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-6xl mx-auto px-4 py-10">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-light tracking-wide mb-2">Nueva Colección</h2>
            <p class="text-gray-600 text-sm">Elige tus prendas favoritas, selecciona tu talla y arma tu pedido.</p>
        </div>

        <!-- Grid de Productos (Ejemplo de estructura) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Producto 1 -->
            <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm flex flex-col justify-between" data-product-id="prod-1">
                <div>
                    <div class="bg-gray-100 h-64 rounded-xl mb-4 overflow-hidden flex items-center justify-center text-gray-400">
                        <!-- Aquí va la imagen o carrusel de tu producto -->
                        <span>[Foto de la prenda]</span>
                    </div>
                    <span id="badge-prod-1" class="text-xs text-gold uppercase tracking-wider font-semibold">Exclusivo</span>
                    <h3 class="text-lg font-medium mt-1">Vestido Elegante</h3>
                    <p id="name-prod-1" class="text-sm text-gray-500 mb-4">Silueta sofisticada en tonos neutros</p>
                    
                    <!-- Selección de Talla -->
                    <div class="mb-4">
                        <label class="block text-xs font-semibold uppercase text-gray-600 mb-1">Talla:</label>
                        <select id="talla-prod-1" class="w-full border border-gray-300 rounded-lg p-2 text-sm bg-white focus:outline-none focus:border-gold">
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                        </select>
                    </div>

                    <!-- Nota o Detalle adicional -->
                    <div class="mb-4">
                        <label class="block text-xs font-semibold uppercase text-gray-600 mb-1">Nota (Opcional):</label>
                        <input type="text" id="nota-prod-1" placeholder="Ej. Cambiar color de hilo..." class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:border-gold">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-lg font-bold text-gray-900">$120.000</span>
                    </div>
                    <button onclick="addCurrentToCart('prod-1')" class="w-full bg-black text-white py-3 rounded-xl font-medium tracking-wide hover:bg-gray-800 transition">
                        Añadir a la bolsa
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- Notificación Elegante (Toast) -->
    <div id="toast-notification" class="fixed bottom-6 right-6 z-50 bg-black text-cream border border-gold/40 px-6 py-4 rounded-xl shadow-2xl flex items-center space-x-4 max-w-sm hidden">
        <div class="bg-gold/20 text-gold p-2 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-bag-shopping text-lg"></i>
        </div>
        <div class="flex-grow">
            <p class="text-xs text-gold uppercase tracking-widest font-semibold">Melany Studio</p>
            <p id="toast-message" class="text-sm font-medium text-white">¡Producto agregado con éxito!</p>
        </div>
        <button onclick="hideToast()" class="text-gray-400 hover:text-white text-lg">&times;</button>
    </div>

    <!-- Script de Lógica del Carrito y Notificación -->
    <script>
        // Precios de ejemplo asociados a los IDs de producto
        const productPrices = {
            'prod-1': 120000
        };

        let cart = [];

        function addCurrentToCart(productId) {
            const collectionTitle = document.querySelector(`[data-product-id="${productId}"] h3`).textContent;
            const characterName = document.getElementById(`badge-${productId}`).textContent;
            const detailsText = document.getElementById(`name-${productId}`).textContent;
            const productPrice = productPrices[productId];
            
            const selectedTalla = document.getElementById(`talla-${productId}`).value;
            const userNota = document.getElementById(`nota-${productId}`).value.trim();
            
            let fullName = `${collectionTitle} - ${characterName} (${detailsText}) | Talla: ${selectedTalla}`;
            if (userNota) {
                fullName += ` | Nota: ${userNota}`;
            }
            
            const existingItem = cart.find(item => item.name === fullName);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name: fullName, price: productPrice, quantity: 1 });
            }
            updateCartUI();
            
            // Mostrar la notificación elegante
            showToast(`Se añadió "${collectionTitle}" a tu bolsa.`);
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-counter').textContent = totalItems;
        }

        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.textContent = message;
            
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.classList.add('hidden'), 400);
            }, 3500);
        }

        function hideToast() {
            const toast = document.getElementById('toast-notification');
            toast.classList.remove('show');
            setTimeout(() => toast.classList.add('hidden'), 400);
        }

        function toggleCartModal() {
            // Aquí puedes abrir tu modal del carrito actual
            alert("Aquí se abre tu resumen del carrito para enviar a WhatsApp.");
        }
    </script>
</body>
</html>
